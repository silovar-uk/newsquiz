<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0f1117" />
  <meta name="description" content="ニュースと背景知識をつなげる、スマホ向け四択クイズアプリ" />
  <title>News Context Quiz</title>
  <style>body{margin:0;background:#0f1117;color:#f4f6fb;font-family:-apple-system,BlinkMacSystemFont,"Noto Sans JP","Hiragino Sans","Yu Gothic",sans-serif}#boot{min-height:100vh;display:grid;place-items:center;padding:24px;text-align:center;line-height:1.7}#boot small{display:block;color:#aab1c0;margin-top:8px}</style>
</head>
<body>
  <div id="root"><div id="boot">News Context Quiz を起動しています…<small>初回だけ少し時間がかかることがあります</small></div></div>
  <script type="module">
    const JS_PARTS = [
      './chunks/js-00.txt',
      './chunks/js-01.txt',
      './chunks/js-02.txt',
      './chunks/js-03.txt',
      './chunks/js-04.txt'
    ];
    const CSS_PART = './chunks/css.txt';

    async function unzipBase64(base64) {
      const bytes = Uint8Array.from(atob(base64), (char) => char.charCodeAt(0));
      const stream = new Blob([bytes]).stream().pipeThrough(new DecompressionStream('gzip'));
      return new Response(stream).text();
    }

    try {
      const [cssBase64, ...jsParts] = await Promise.all([fetch(CSS_PART).then((response) => response.text()), ...JS_PARTS.map((path) => fetch(path).then((response) => response.text()))]);
      const [css, js] = await Promise.all([unzipBase64(cssBase64), unzipBase64(jsParts.join(''))]);
      const style = document.createElement('style');
      style.textContent = css;
      document.head.appendChild(style);
      await import(URL.createObjectURL(new Blob([js], { type: 'text/javascript' })));
    } catch (error) {
      console.error(error);
      document.getElementById('root').innerHTML = '<div id="boot">起動に失敗しました。通信状態を確認して、ページを再読み込みしてください。<small>ブラウザが古い場合は最新版のSafariまたはChromeをお試しください。</small></div>';
    }
  </script>
</body>
</html>
